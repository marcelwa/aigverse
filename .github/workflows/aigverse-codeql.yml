name: 📝 • CodeQL

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "libs/**"
      - ".github/workflows/aigverse-codeql.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "libs/**"
      - ".github/workflows/aigverse-codeql.yml"
  merge_group:
  schedule:
    - cron: "30 5 * * 6"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    name: ${{matrix.emoji}} Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp", "python"]
        include:
          - language: cpp
            emoji: 🇨
            build-mode: manual
          - language: python
            emoji: 🐍
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: "ubuntu-latest-aigverse"
          save: false
          max-size: 10G

      - name: Set up mold as linker
        uses: rui314/setup-mold@v1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: ${{matrix.language}}
          build-mode: ${{ matrix.build-mode }}
          config: |
            queries:
              - uses: security-and-quality

      - name: Install the latest version of uv
        if: matrix.language == 'cpp'
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Install build dependencies with uv
        if: matrix.language == 'cpp'
        run: uv sync --only-group build --no-install-project

      - name: Configure CMake
        if: matrix.language == 'cpp'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DPython_EXECUTABLE=${{ github.workspace }}/.venv/bin/python

      - name: Build
        if: matrix.language == 'cpp'
        run: cmake --build build -j4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          upload: False
          output: sarif-results

      - name: Filter SARIF file to exclude library warnings
        uses: advanced-security/filter-sarif@main
        with:
          patterns: |
            -**/docs/**
            -**/build/_deps/**
            -**/.venv/**
          input: sarif-results/${{ matrix.language }}.sarif
          output: sarif-results/${{ matrix.language }}.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
