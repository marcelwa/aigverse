name: 📝 • CodeQL

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "**/*.pyi"
      - "libs/**"
      - ".github/workflows/aigverse-codeql.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "**/*.pyi"
      - "libs/**"
      - ".github/workflows/aigverse-codeql.yml"
  merge_group:
  schedule:
    - cron: "30 5 * * 6"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: ${{matrix.emoji}} Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read # required by github/codeql-action/init to check the workflow run
      contents: read # required to check out the repository
      security-events: write # required to upload the SARIF results

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp", "python"]
        include:
          - language: cpp
            emoji: 🇨
            build-mode: manual
          - language: python
            emoji: 🐍
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: "ubuntu-latest-aigverse"
          save: false
          max-size: 10G

      - name: Set up mold as linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{matrix.language}}
          build-mode: ${{ matrix.build-mode }}
          config: |
            queries:
              - uses: security-and-quality

      - name: Install the latest version of uv
        if: matrix.language == 'cpp'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Install build dependencies with uv
        if: matrix.language == 'cpp'
        run: uv sync --only-group build --no-install-project

      - name: Configure CMake
        if: matrix.language == 'cpp'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DPython_EXECUTABLE=.venv/bin/python

      - name: Build
        if: matrix.language == 'cpp'
        run: cmake --build build -j4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          upload: False
          output: sarif-results

      - name: Filter SARIF file to exclude library warnings
        uses: advanced-security/filter-sarif@83be8931196fc98d9c506ff10e17763fed75bd1b # main
        with:
          patterns: |
            -**/docs/**
            -**/build/_deps/**
            -**/.venv/**
          input: sarif-results/${{ matrix.language }}.sarif
          output: sarif-results/${{ matrix.language }}.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
