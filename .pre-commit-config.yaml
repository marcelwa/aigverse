# To run all pre-commit checks, use:
#
#     uvx prek run -a
#
# To install pre-commit hooks that run every time you commit:
#
#     uv tool install prek
#     prek install
#

ci:
  autoupdate_commit_msg: "⬆️ Bump pre-commit hooks"
  autofix_commit_msg: "🎨 Incorporated pre-commit fixes"
  autoupdate_schedule: quarterly
  skip: [ty-check]

exclude: "^(docs/examples/|.*/_deps/)"

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: check-vcs-permalinks
        priority: 0
      - id: check-docstring-first
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-symlinks
        priority: 0
      - id: check-json
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-yaml
        exclude: ^(\.clang-format)$
        priority: 0
      - id: debug-statements
        priority: 0
      - id: end-of-file-fixer
        priority: 1
      - id: mixed-line-ending
        priority: 1
      - id: trailing-whitespace
        priority: 1

  # Handle unwanted unicode characters
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-ligatures
        priority: 1
      - id: fix-smartquotes
        priority: 1

  # Check for spelling
  - repo: https://github.com/crate-ci/typos
    rev: v1.44.0
    hooks:
      - id: typos
        priority: 0

  # CMake format and lint the CMakeLists.txt files
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
        types: [file]
        files: (\.cmake|CMakeLists.txt)(.in)?$
        priority: 1

  # clang-format the C++ part of the code base
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.1
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: ["-style=file"]
        priority: 1

  # Ensure uv lock file is up-to-date
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.10
    hooks:
      - id: uv-lock
        priority: 0

  # Python linting using ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
        priority: 1
      - id: ruff-check
        require_serial: true
        priority: 2

  # Check static types with ty
  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uvx python -c "import subprocess; import sys; r = subprocess.run(['uv', 'sync', '--no-install-project', '--inexact', '--only-group', 'test', '--only-group', 'adapters', '--only-group', 'lint']); sys.exit(r.returncode or subprocess.run(['uv', 'run', '--no-sync', 'ty', 'check']).returncode)"
        language: unsupported
        require_serial: true
        types_or: [python, pyi, jupyter]
        exclude: ^(docs/)
        pass_filenames: false
        priority: 3

  # Clean jupyter notebooks
  - repo: https://github.com/srstevenson/nb-clean
    rev: 4.0.1
    hooks:
      - id: nb-clean
        args:
          - --remove-empty-cells
          - --preserve-cell-metadata
          - raw_mimetype
          - --
        priority: 2

  # Also run Black on examples in the documentation
  - repo: https://github.com/adamchainz/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies: [black==24.*]
        priority: 2

  # Format configuration files with prettier
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.1
    hooks:
      - id: prettier
        types_or: [yaml, markdown, html, css, scss, javascript, json]
        priority: 1

  # Check JSON schemata
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.0
    hooks:
      - id: check-github-workflows
        priority: 0
      - id: check-readthedocs
        priority: 0
      - id: check-renovate
        additional_dependencies: ["json5"]
        priority: 0

  # Check the pyproject.toml file
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: 2026.03.13
    hooks:
      - id: validate-pyproject
        priority: 0
